<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>VetTrack — Offline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F0F6FF;
    color: #1a2b3c;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }
  .card {
    text-align: center;
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
  }
  .logo {
    width: 72px;
    height: 72px;
    background: #1A6FBF;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
  }
  .logo svg {
    width: 40px;
    height: 40px;
    fill: #fff;
  }
  .brand {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1A6FBF;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: #1a2b3c;
  }
  p {
    font-size: 0.95rem;
    color: #4a6180;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .retry-btn {
    display: inline-block;
    background: #1A6FBF;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.75rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    min-width: 44px;
    min-height: 44px;
    transition: background 0.2s;
  }
  .retry-btn:active {
    background: #155ca0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <rect x="16" y="4" width="8" height="32" rx="2"/>
      <rect x="4" y="16" width="32" height="8" rx="2"/>
    </svg>
  </div>
  <div class="brand">VetTrack</div>
  <h1>You're offline</h1>
  <p>You're offline. Your changes will sync when reconnected.</p>
  <button class="retry-btn" onclick="window.location.reload()">Retry</button>
</div>
</body>
</html>

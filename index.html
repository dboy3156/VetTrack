<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Primary Meta -->
    <title>VetTrack — Veterinary Equipment QR Tracking System</title>
    <meta name="description" content="VetTrack is a mobile-first QR code tracking system built for veterinary hospitals and ER clinics. Scan, track, and manage equipment in real time — even offline." />
    <meta name="keywords" content="veterinary equipment tracking, vet hospital QR tracking, ER veterinary workflow tool, veterinary management software, animal hospital equipment management" />
    <meta name="author" content="VetTrack" />
    <link rel="canonical" href="https://vettrack.uk/" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vettrack.uk/" />
    <meta property="og:title" content="VetTrack — Veterinary Equipment QR Tracking System" />
    <meta property="og:description" content="Mobile-first QR equipment tracking for veterinary hospitals and ER clinics. Real-time status, offline support, issue alerts, and shift handoffs — all from any device." />
    <meta property="og:image" content="https://vettrack.uk/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="VetTrack" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://vettrack.uk/" />
    <meta name="twitter:title" content="VetTrack — Veterinary Equipment QR Tracking System" />
    <meta name="twitter:description" content="Mobile-first QR equipment tracking for veterinary hospitals and ER clinics. Real-time status, offline support, issue alerts, and shift handoffs." />
    <meta name="twitter:image" content="https://vettrack.uk/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "VetTrack",
      "url": "https://vettrack.uk",
      "description": "Mobile-first QR code equipment tracking system for veterinary hospitals and emergency clinics. Features real-time status updates, offline support, issue reporting, alert management, and monthly PDF reports.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "QR code equipment scanning",
        "Real-time equipment status tracking",
        "Offline-first with automatic sync",
        "Issue reporting with photo evidence",
        "Alert management with severity levels",
        "Shift handoff and checkout workflows",
        "Monthly PDF reports",
        "Role-based access control"
      ],
      "screenshot": "https://vettrack.uk/og-image.png",
      "provider": {
        "@type": "Organization",
        "name": "VetTrack"
      }
    }
    </script>

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Mobile / PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VetTrack" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

import { useGetCurrentUser } from "@/lib/api";

export function useUserRole() {
  const { data, isLoading } = useGetCurrentUser({
    query: {
      retry: false,
      staleTime: 1000 * 60 * 5,
    },
  });

  return {
    role: data?.role ?? "admin",
    isAdmin: data?.role === "admin" || !data?.role,
    isLoading,
  };
}

name: CI — VetTrack

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Tests & typecheck
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vettrack
          POSTGRES_PASSWORD: vettrack
          POSTGRES_DB: vettrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://vettrack:vettrack@localhost:5432/vettrack_test
      SESSION_SECRET: ci-test-secret-that-is-long-enough-32chars
      PORT: 3000

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔷 TypeScript
        run: pnpm exec tsc --noEmit

      - name: 🏗️ Frontend build
        run: pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      # Apply all `migrations/*.sql` via `server/migrate.ts` (tracks `vt_migrations`).
      # `pnpm db:migrate` (drizzle-kit) only runs entries in `migrations/meta/_journal.json`.
      - name: 🗄️ Database migrations
        run: pnpm migrate

      - name: 🧪 Test suite
        run: pnpm test

  deploy-check:
    name: 🚀 Deploy pre-flight
    runs-on: ubuntu-latest
    needs: test
    # Secrets are unavailable to workflows from forks; skip rather than fail closed.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
      PORT: 3000

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Pre-flight env check
        run: bash deploy.sh --check --no-color

  deploy:
    name: 🚢 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test, deploy-check]
    # Only deploy on push to main — not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      PORT: 3000

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy
        run: bash deploy.sh --no-color

  gate:
    name: ✅ Merge gate
    runs-on: ubuntu-latest
    needs: [test, deploy-check, deploy]
    if: always()

    steps:
      - name: Require green checks
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Tests failed — blocking merge"
            exit 1
          fi
          case "${{ needs.deploy-check.result }}" in
            success)
              echo "✅ Deploy pre-flight passed"
              ;;
            skipped)
              echo "ℹ️ Deploy pre-flight skipped (fork PR or filtered run)"
              ;;
            *)
              echo "❌ Deploy pre-flight did not succeed — blocking merge"
              exit 1
              ;;
          esac
          case "${{ needs.deploy.result }}" in
            success)
              echo "✅ Deployed to Railway"
              ;;
            skipped)
              echo "ℹ️ Deploy skipped (PR or non-main branch)"
              ;;
            *)
              echo "❌ Railway deploy failed"
              exit 1
              ;;
          esac
          echo "✅ All required checks passed"

name: CI — VetTrack

on:
  pull_request:
    branches: [main, "**"]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Tests & Type Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vettrack
          POSTGRES_PASSWORD: vettrack
          POSTGRES_DB: vettrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://vettrack:vettrack@localhost:5432/vettrack_test
      SESSION_SECRET: ci-test-secret-that-is-long-enough-32chars
      PORT: 8080

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔷 TypeScript check
        run: pnpm exec tsc --noEmit

      - name: 🔍 Lint
        run: pnpm lint || echo "⚠️ No lint script — skipping"

      - name: 🗄️ Run migrations
        run: pnpm db:migrate

      - name: 🧪 Basic tests
        run: node tests/basic.test.js

      - name: 🔀 Concurrency tests
        run: node tests/concurrency.test.js

      - name: 📴 Offline/sync tests
        run: node tests/offline.test.js

      - name: ⚔️ Conflict resolution tests
        run: node tests/conflict.test.js

  deploy-check:
    name: 🚀 Deploy Pre-flight
    runs-on: ubuntu-latest
    needs: test

    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
      PORT: 8080

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Deploy pre-flight check
        run: bash deploy.sh --check --no-color

  gate:
    name: ✅ Merge Gate
    runs-on: ubuntu-latest
    needs: [test, deploy-check]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Tests failed — blocking merge"
            exit 1
          fi
          if [[ "${{ needs.deploy-check.result }}" != "success" ]]; then
            echo "❌ Deploy pre-flight failed — blocking merge"
            exit 1
          fi
          echo "✅ All checks passed"

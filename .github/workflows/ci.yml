name: CI — Proof-Based Validation

on:
  pull_request:
    branches:
      - main
      - "**"
  push:
    branches:
      - main

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run basic sanity tests
        run: node tests/basic.test.js

      - name: Run concurrency tests
        run: node tests/concurrency.test.js

      - name: Run offline/sync tests
        run: node tests/offline.test.js

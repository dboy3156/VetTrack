# VetTrack desktop cleaner: tests on PR; tagged releases cleaner-v* build Win/macOS/Linux binaries.
name: Desktop cleaner

on:
  pull_request:
    paths:
      - "desktop/cleaner/**"
      - ".github/workflows/desktop-cleaner-release.yml"
  push:
    tags:
      - "cleaner-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/cleaner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Qt runtime deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libdbus-1-3
      - run: pip install -e ".[dev]"
      - run: pytest
        env:
          QT_QPA_PLATFORM: offscreen

  build:
    needs: test
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/cleaner-v'))
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop/cleaner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Qt runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libdbus-1-3
      - run: pip install -e . pyinstaller
      - run: pyinstaller vettrack_cleaner.spec
      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath "vettrack-cleaner-${{ runner.os }}.zip"
      - name: Archive (Unix)
        if: runner.os != 'Windows'
        run: cd dist && zip -r "../vettrack-cleaner-${{ runner.os }}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: vettrack-cleaner-${{ runner.os }}
          path: desktop/cleaner/vettrack-cleaner-${{ runner.os }}.zip

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/cleaner-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vettrack-cleaner-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
